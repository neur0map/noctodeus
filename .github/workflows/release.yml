name: Release

on:
  push:
    branches: [master]
    paths-ignore:
      - "*.md"
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # First job: bump patch version tag
  tag:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
          TAG_CONTEXT: repo

  # Second job: build on all platforms using the new tag
  build:
    needs: tag
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            label: "macOS ARM64"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            label: "macOS x64"
          - platform: ubuntu-22.04
            args: ""
            label: "Linux x64"
          # Windows x64 disabled — MSVC linker error 1169 (duplicate
          # symbols) due to large Rust dependency graph (ort + memvid-core
          # + tantivy). Needs dependency refactor to re-enable.

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.tag.outputs.tag }}
          releaseName: "Noctodeus ${{ needs.tag.outputs.tag }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
